# Base configuration scaffold for DQN Atari experiments.
experiment:
  name: dqn_atari_base
  seed: 0
  output_dir: experiments/dqn_atari/runs/${experiment.name}_${experiment.seed}

env:
  id: ALE/Pong-v5
  mode: train
  action_set: minimal
  frameskip: 4
  repeat_action_probability: 0.0
  max_noop_start: 30

preprocess:
  frame_size: 84
  grayscale: true
  stack_size: 4
  normalize: false

agent:
  architecture: nature_cnn
  gamma: 0.99
  learning_rate: 0.00025
  optimizer: rmsprop
  optimizer_eps: 0.00001
  optimizer_alpha: 0.95
  replay_capacity: 1000000
  replay_min_transitions: 50000
  batch_size: 32
  # Target network synchronization:
  # - target_update_interval > 0: 2015 Nature DQN (separate target network, updated every N steps)
  # - target_update_interval = 0: 2013 NIPS DQN (no target network, less stable)
  # See docs/design/dqn_training.md for detailed comparison
  target_update_interval: 10000  # Hard-copy every 10K steps (2015 standard)
  gradient_clip_norm: 10.0

exploration:
  schedule: linear
  epsilon_start: 1.0
  epsilon_end: 0.1
  epsilon_decay_frames: 1000000

eval:
  # Evaluation protocol settings
  epsilon: 0.05  # Small ε-greedy for evaluation (use 0.0 for fully greedy)
  episodes: 10  # Number of episodes to run per evaluation checkpoint
  # Episode termination policy for evaluation:
  # - episode_life: false (DEFAULT) -> Full episode termination only on game over
  # - episode_life: true -> Treat life loss as terminal (NOT recommended for eval)
  episode_life: false  # DEFAULT: Full episodes for evaluation
  deterministic: false  # Set true for fully greedy evaluation (overrides epsilon)

training:
  # Training protocol settings
  total_frames: 10000000  # 10M frames (Pong baseline)
  # Episode termination policy for training:
  # - episode_life: false (DEFAULT) -> Full episode termination only on game over
  # - episode_life: true -> Treat life loss as terminal (optional training optimization)
  # NOTE: Many implementations use episode_life=true during training to help agents
  # learn to preserve lives, but this is NOT required and can be disabled.
  episode_life: true  # OPTIONAL: Life loss as terminal (set false for pure full-episode training)
  train_frequency: 4  # Train every 4 steps
  reward_clip: true  # Clip rewards to {-1, 0, +1}

  # Frame budgets per game (can override in per-game configs)
  frame_budget:
    pong: 10000000  # 10M frames
    breakout: 20000000  # 20M frames
    beam_rider: 20000000  # 20M frames
    smoke_test: 100000  # 100K frames for quick testing

intervals:
  log_frames: 10000
  eval_frames: 250000
  checkpoint_frames: 1000000

logging:
  use_wandb: false
  project: thesis-dqn
  entity: null
  tensorboard_dir: experiments/dqn_atari/tensorboard

hardware:
  device: cuda
  num_envs: 1
