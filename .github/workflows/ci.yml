name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          pytest tests/ -x --tb=short -q

      - name: Run tests with coverage
        if: matrix.python-version == '3.11'
        run: |
          pytest tests/ --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install black isort ruff

      - name: Check formatting with Black
        run: black --check --diff src/ tests/ scripts/

      - name: Check import sorting with isort
        run: isort --check-only --diff src/ tests/

      - name: Lint with Ruff
        run: ruff check src/ tests/

  docs:
    name: Documentation Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate YAML configs
        run: |
          python -c "
          import yaml
          import glob
          for f in glob.glob('experiments/dqn_atari/configs/**/*.yaml', recursive=True):
              print(f'Validating {f}')
              with open(f) as fp:
                  yaml.safe_load(fp)
          print('All YAML files valid')
          "

      - name: Check for broken markdown links
        run: |
          # Basic check for common issues
          echo "Checking markdown files..."
          find docs/ -name "*.md" -exec grep -l "]()" {} \; || echo "No empty links found"

  build:
    name: Package Build
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify project structure
        run: |
          echo "Checking project structure..."
          test -f train_dqn.py || exit 1
          test -d src/ || exit 1
          test -d tests/ || exit 1
          test -d experiments/dqn_atari/configs/ || exit 1
          echo "Project structure verified"

      - name: Check script permissions
        run: |
          echo "Checking executable scripts..."
          test -x scripts/reproduce_dqn.sh || echo "reproduce_dqn.sh not executable"
          test -x experiments/dqn_atari/scripts/run_multi_seed.sh || echo "run_multi_seed.sh not executable"
          echo "Script check complete"
