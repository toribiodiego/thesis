# Pong - DQN + SPR + Augmentation
# ==========================================
# Combined condition: SPR loss with random shift augmentation.
# EMA and dropout match SPR-only config to isolate augmentation
# as the only difference between +SPR and +Both conditions.
#
# Usage:
#   python train_dqn.py --cfg experiments/dqn_atari/configs/atari100k_pong_both.yaml --seed 42

base_config: "experiments/dqn_atari/configs/atari100k_pong.yaml"

experiment:
  name: "atari100k_pong_both"
  notes: "DQN + SPR + augmentation on Pong under Atari-100K protocol"

spr:
  enabled: true

ema:
  momentum: 0.99

network:
  dropout: 0.5

augmentation:
  enabled: true
