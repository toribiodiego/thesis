# Road Runner - DQN + Augmentation
# ==================================
# Random shift augmentation (DrQ-style) without SPR.
# Isolates the effect of data augmentation on vanilla DQN.
#
# Usage:
#   python train_dqn.py --cfg experiments/dqn_atari/configs/atari100k_road_runner_aug.yaml --seed 42

base_config: "experiments/dqn_atari/configs/atari100k_road_runner.yaml"

experiment:
  name: "atari100k_road_runner_aug"
  notes: "DQN + augmentation on Road Runner under Atari-100K protocol"

augmentation:
  enabled: true
  type: "random_shift"
  random_shift:
    pad: 4
