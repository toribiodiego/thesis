# Kung Fu Master - Rainbow + SPR
# ==============================
# Rainbow agent with SPR auxiliary loss.
# Dropout 0.5 (regularizer without augmentation).
# EMA momentum 0.99.
#
# Usage:
#   python train_dqn.py --cfg experiments/dqn_atari/configs/atari100k_kung_fu_master_rainbow_spr.yaml --seed 42

base_config: "experiments/dqn_atari/configs/atari100k_kung_fu_master_rainbow.yaml"

experiment:
  name: "atari100k_kung_fu_master_rainbow_spr"
  notes: "Rainbow + SPR on Kung Fu Master under Atari-100K protocol"

spr:
  enabled: true

ema:
  momentum: 0.99

network:
  dropout: 0.5
