# Pong - Rainbow DQN
# ==================
# Data-efficient Rainbow: C51 + Double DQN + Dueling + NoisyNets + PER + 10-step.
# Replay ratio 2, target update every step (Schwarzer et al. 2021, Table 3).
# Adam lr=1e-4, eps=1.5e-4 (Schwarzer et al. 2021, Table 3).
#
# Usage:
#   python train_dqn.py --cfg experiments/dqn_atari/configs/atari100k_pong_rainbow.yaml --seed 42

base_config: "experiments/dqn_atari/configs/atari100k_pong.yaml"

experiment:
  name: "atari100k_pong_rainbow"
  notes: "Rainbow DQN on Pong under Atari-100K protocol"

rainbow:
  enabled: true
  multi_step:
    n: 10

network:
  fc_hidden: 256  # SPR paper uses 256 (Schwarzer et al. 2021, Table 3)

training:
  train_every: 1       # Train every env step (SPR paper cadence)
  updates_per_step: 2  # 2 updates / train_every 1 = replay ratio 2
  optimizer:
    type: "adam"
    lr: 0.0001
    adam:
      eps: 0.00015

target_network:
  update_interval: 1

replay:
  warmup_steps: 20000
  min_size: 20000

logging:
  checkpoint:
    save_every: 40000
    keep_last_n: 10

evaluation:
  eval_every: 999999
