# Road Runner - Atari-100K Configuration
# ========================================
# Dense reward game. Frequent scoring from collecting items and avoiding enemies.
#
# Action space: 18 actions (full action set)
#
# SPR paper reference (modified Rainbow): 14220.5 mean return
# Random agent: 11.5 | Human: 7845.0
#
# Usage:
#   python train_dqn.py --cfg experiments/dqn_atari/configs/atari100k_road_runner.yaml --seed 42

base_config: "experiments/dqn_atari/configs/atari100k_base.yaml"

environment:
  env_id: "RoadRunnerNoFrameskip-v4"

experiment:
  name: "atari100k_road_runner"
  notes: "Vanilla DQN on Road Runner under Atari-100K protocol"
