# Breakout - Rainbow DQN
# ======================
# Data-efficient Rainbow: C51 + Double DQN + Dueling + NoisyNets + PER + 10-step.
# Replay ratio 2, target update every step (Schwarzer et al. 2021, Table 3).
# Adam lr=6.25e-5, eps=1.5e-4.
#
# Usage:
#   python train_dqn.py --cfg experiments/dqn_atari/configs/atari100k_breakout_rainbow.yaml --seed 42

base_config: "experiments/dqn_atari/configs/atari100k_breakout.yaml"

experiment:
  name: "atari100k_breakout_rainbow"
  notes: "Rainbow DQN on Breakout under Atari-100K protocol"

rainbow:
  enabled: true
  multi_step:
    n: 10

training:
  updates_per_step: 8
  optimizer:
    type: "adam"
    lr: 0.0000625
    adam:
      eps: 0.00015

target_network:
  update_interval: 1

replay:
  warmup_steps: 20000
  min_size: 20000

logging:
  checkpoint:
    save_every: 40000
    keep_last_n: 10

evaluation:
  eval_every: 999999
