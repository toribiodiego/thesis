experiment:
  name: atari100k_crazy_climber_both
  run_id: null
  notes: DQN + SPR + augmentation on Crazy Climber under Atari-100K protocol
  deterministic:
    enabled: false
    strict: false
    warn_only: true
environment:
  env_id: CrazyClimberNoFrameskip-v4
  preprocessing:
    frame_size: 84
    grayscale: true
    frame_stack: 4
    frame_max_pool: true
    max_pool_frames: 2
    clip_rewards: true
    reward_range:
    - -1
    - 1
  action_repeat: 4
  episode:
    episodic_life: true
    noop_max: 30
    fire_on_reset: true
  max_episode_steps: null
network:
  architecture: dqn
  conv1_channels: 32
  conv1_kernel: 8
  conv1_stride: 4
  conv2_channels: 64
  conv2_kernel: 4
  conv2_stride: 2
  conv3_channels: 64
  conv3_kernel: 3
  conv3_stride: 1
  fc_hidden: 512
  dropout: 0.5
  init_method: kaiming_normal
  init_mode: fan_out
  dtype: float32
  device: cuda
replay:
  capacity: 100000
  batch_size: 32
  min_size: 2000
  warmup_steps: 2000
  store_uint8: true
  normalize_on_sample: true
  pin_memory: false
  track_episodes: true
training:
  total_frames: 400000
  train_every: 4
  gamma: 0.99
  loss:
    type: mse
    huber_delta: 1.0
  gradient_clip:
    enabled: true
    max_norm: 10.0
    norm_type: 2.0
  optimizer:
    type: rmsprop
    lr: 0.00025
    rmsprop:
      alpha: 0.95
      eps: 0.01
      momentum: 0.0
    adam:
      betas:
      - 0.9
      - 0.999
      eps: 1.0e-08
target_network:
  update_interval: 2000
  update_method: hard
exploration:
  schedule:
    type: linear
    start_epsilon: 1.0
    end_epsilon: 0.1
    decay_frames: 200000
  eval_epsilon: 0.05
evaluation:
  enabled: true
  eval_every: 40000
  num_episodes: 30
  epsilon: 0.05
  deterministic: false
  record_video: true
  video_format: mp4
  metrics:
  - episode_return
  - episode_length
  - lives_lost
  - q_values
logging:
  base_dir: experiments/dqn_atari/runs
  log_every_steps: 500
  log_every_episodes: 1
  tensorboard:
    enabled: true
    flush_interval: 1000
  csv:
    enabled: true
    smoothing_window: 100
  wandb:
    enabled: false
    project: dqn-atari
    entity: null
    tags: []
    upload_artifacts: false
    artifact_upload_interval: 1000000
  checkpoint:
    enabled: true
    save_every: 100000
    keep_last_n: 5
    save_best: true
  step_metrics:
  - loss
  - td_error
  - grad_norm
  - q_values
  - epsilon
  - learning_rate
  episode_metrics:
  - episode_return
  - episode_length
  - lives_lost
  reference_q:
    enabled: false
    num_states: 10
    log_every: 10000
spr:
  enabled: true
  prediction_steps: 5
  loss_weight: 2.0
  projection_dim: 512
  transition_channels: 64
ema:
  momentum: 0.99
seed:
  value: 42
  save_rng_states: true
system:
  num_workers: 0
  empty_cache_every: 1000
  progress_bar: true
  verbose: true
augmentation:
  enabled: true
  type: random_shift
  random_shift:
    pad: 4
cli:
  args:
    config_file: experiments/dqn_atari/configs/atari100k_crazy_climber_both.yaml
    seed: 42
    resume: null
    overrides: []
    dry_run: false
    device: null
    tags: []
    dev_run: false
