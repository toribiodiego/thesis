# Breakout Configuration
# =======================
# Game-specific overrides for Breakout (BreakoutNoFrameskip-v4).
#
# Inherits all settings from base.yaml and overrides only game-specific fields.
#
# Usage:
#   python train_dqn.py --cfg experiments/dqn_atari/configs/breakout.yaml --seed 42
#
# Expected results (DQN 2013 paper):
#   - Training: ~10M frames to see improvement, 50M for convergence
#   - Score: Average reward ~300-400 (paper reports 401.2 ± 26.9)
#   - Note: Breakout benefits from longer training (full 50M frames recommended)

# Inherit base configuration
base_config: "experiments/dqn_atari/configs/base.yaml"

# =============================================================================
# Game-Specific Overrides
# =============================================================================

# Environment
environment:
  env_id: "BreakoutNoFrameskip-v4"  # Breakout environment ID

# Experiment metadata
experiment:
  name: "breakout"  # Experiment name (used in run directory: runs/breakout_<seed>_<timestamp>/)
  notes: "Breakout training with DQN (2013 paper reproduction)"

# Training budget
training:
  total_frames: 50000000  # 50M frames (full DQN paper training)
  # Note: Breakout requires longer training than Pong to reach good performance

# Evaluation
evaluation:
  num_episodes: 30  # Use 30 episodes for final evaluation (DQN paper standard)
  eval_every: 250000  # Evaluate every 250K frames

# Action space notes:
# Breakout has 4 discrete actions (minimal action set):
#   0: NOOP (no operation)
#   1: FIRE (launch ball / start game)
#   2: RIGHT (move paddle right)
#   3: LEFT (move paddle left)
# All actions are meaningful in Breakout
