# ============================================================================
# Base DQN Atari Configuration
# ============================================================================
#
# PURPOSE:
# Default hyperparameters and runtime settings for DQN reproduction.
# This file defines the complete configuration scaffold that all game-specific
# configs inherit from via OmegaConf defaults mechanism.
#
# USAGE:
# - Do NOT modify this file for game-specific settings
# - Create per-game configs (pong.yaml, breakout.yaml) that inherit from this
# - Override specific fields in per-game configs (env.id, total_frames, etc.)
# - Use CLI overrides for quick parameter sweeps
#
# INHERITANCE:
# Game-specific configs inherit all settings from this file:
#   defaults:
#     - base
#
# WHAT'S CONFIGURED:
# - Experiment metadata (name, seed, output directory)
# - Environment settings (game ID, frameskip, no-op starts)
# - Preprocessing (frame size, grayscale, frame stacking)
# - Agent hyperparameters (learning rate, batch size, replay capacity)
# - Target network synchronization (2013 vs 2015 DQN toggle)
# - Exploration schedule (epsilon-greedy parameters)
# - Evaluation protocol (episodes, epsilon, episode_life policy)
# - Training protocol (frame budget, episode_life, reward clipping)
# - Logging intervals (checkpoints, evaluation, metrics)
# - Hardware settings (device selection)
#
# KEY TOGGLES:
# - training.episode_life: Life loss as terminal (true) vs full episodes (false)
# - agent.target_update_interval: Target net sync (>0) vs disabled (0)
# - training.reward_clip: Reward clipping on (true) vs off (false)
# - env.max_noop_start: Random no-ops (30) vs deterministic starts (0)
#
# REFERENCE:
# - Config guide: experiments/dqn_atari/configs/README.md
# - Training spec: docs/design/dqn_training.md
# - Wrapper spec: docs/design/atari_env_wrapper.md
# - Quick start: docs/quick_start.md
#
# ============================================================================

experiment:
  name: dqn_atari_base
  seed: 0
  output_dir: experiments/dqn_atari/runs/${experiment.name}_${experiment.seed}

env:
  id: ALE/Pong-v5
  mode: train
  action_set: minimal
  frameskip: 4
  repeat_action_probability: 0.0
  max_noop_start: 30

preprocess:
  frame_size: 84
  grayscale: true
  stack_size: 4
  normalize: false

agent:
  architecture: nature_cnn
  gamma: 0.99
  learning_rate: 0.00025
  optimizer: rmsprop
  optimizer_eps: 0.00001
  optimizer_alpha: 0.95
  replay_capacity: 1000000
  replay_min_transitions: 50000
  batch_size: 32
  # Target network synchronization:
  # - target_update_interval > 0: 2015 Nature DQN (separate target network, updated every N steps)
  # - target_update_interval = 0: 2013 NIPS DQN (no target network, less stable)
  # See docs/design/dqn_training.md for detailed comparison
  target_update_interval: 10000  # Hard-copy every 10K steps (2015 standard)
  gradient_clip_norm: 10.0

exploration:
  schedule: linear
  epsilon_start: 1.0
  epsilon_end: 0.1
  epsilon_decay_frames: 1000000

eval:
  # Evaluation protocol settings
  epsilon: 0.05  # Small ε-greedy for evaluation (use 0.0 for fully greedy)
  episodes: 10  # Number of episodes to run per evaluation checkpoint
  # Episode termination policy for evaluation:
  # - episode_life: false (DEFAULT) -> Full episode termination only on game over
  # - episode_life: true -> Treat life loss as terminal (NOT recommended for eval)
  episode_life: false  # DEFAULT: Full episodes for evaluation
  deterministic: false  # Set true for fully greedy evaluation (overrides epsilon)

training:
  # Training protocol settings
  total_frames: 10000000  # 10M frames (Pong baseline)
  # Episode termination policy for training:
  # - episode_life: false (DEFAULT) -> Full episode termination only on game over
  # - episode_life: true -> Treat life loss as terminal (optional training optimization)
  # NOTE: Many implementations use episode_life=true during training to help agents
  # learn to preserve lives, but this is NOT required and can be disabled.
  episode_life: true  # OPTIONAL: Life loss as terminal (set false for pure full-episode training)
  train_frequency: 4  # Train every 4 steps
  reward_clip: true  # Clip rewards to {-1, 0, +1}

  # Frame budgets per game (can override in per-game configs)
  frame_budget:
    pong: 10000000  # 10M frames
    breakout: 20000000  # 20M frames
    beam_rider: 20000000  # 20M frames
    smoke_test: 100000  # 100K frames for quick testing

intervals:
  log_frames: 10000
  eval_frames: 250000
  checkpoint_frames: 1000000

logging:
  use_wandb: false
  project: thesis-dqn
  entity: null
  tensorboard_dir: experiments/dqn_atari/tensorboard

hardware:
  device: cuda
  num_envs: 1
