# ============================================================================
# Beam Rider-specific DQN configuration
# ============================================================================
#
# Game: Beam Rider (ALE/BeamRider-v5)
# Difficulty: Hard (multi-object tracking, complex patterns)
# Expected training time: 20M frames (~24-48 hours on GPU)
#
# OVERRIDES from base.yaml:
# - experiment.name: dqn_beam_rider (for output directory naming)
# - env.id: ALE/BeamRider-v5 (game selection)
# - training.total_frames: 20M (complex game requiring extended training)
#
# INHERITS from base.yaml:
# - All hyperparameters (learning rate, batch size, etc.)
# - Wrapper configuration (frame skip, stack size, etc.)
# - Training protocol (episode_life, reward_clip, etc.)
# - Evaluation settings
#
# WHEN TO USE:
# - After successful Pong and Breakout training
# - Testing on high-difficulty game
# - Multi-object tracking and pattern recognition
#
# NOTES:
# - Beam Rider is one of the harder Atari games for DQN
# - May require 20M+ frames to see significant improvement
# - Agent must learn to track multiple enemies and avoid collisions
# - Longer episodes than Pong (more complex strategy)
#
# REFERENCE:
# - Design doc: docs/design/dqn_setup.md
# - Wrapper spec: docs/design/atari_env_wrapper.md
# - Config guide: experiments/dqn_atari/configs/README.md
#
# ============================================================================

defaults:
  - base

experiment:
  name: dqn_beam_rider

env:
  id: "ALE/BeamRider-v5"

training:
  total_frames: 20000000  # 20M frames for Beam Rider (high complexity)
