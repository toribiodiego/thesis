# Seaquest - DQN + SPR + Augmentation
# =====================================
# Combined condition: SPR loss with random shift augmentation.
# EMA momentum 0.0 (augmentation provides sufficient regularization).
# No dropout (augmentation replaces it).
#
# Usage:
#   python train_dqn.py --cfg experiments/dqn_atari/configs/atari100k_seaquest_both.yaml --seed 42

base_config: "experiments/dqn_atari/configs/atari100k_seaquest.yaml"

experiment:
  name: "atari100k_seaquest_both"
  notes: "DQN + SPR + augmentation on Seaquest under Atari-100K protocol"

spr:
  enabled: true

ema:
  momentum: 0.0

augmentation:
  enabled: true
